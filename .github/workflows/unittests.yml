name: Unit Tests

# Run this workflow every time you push to main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' # Change this if you use a different version
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pandas
        # This line installs your other libraries if you have a requirements.txt file
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Run tests with pytest
      run: |
        pytest tests/