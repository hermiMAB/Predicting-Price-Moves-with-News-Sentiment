name: Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4   # Updated to v4 to fix the warning
    
    - name: Set up Python
      uses: actions/setup-python@v5   # Updated to v5 to fix the warning
      with:
        python-version: '3.10'
        
    - name: Install TA-Lib C-Library
      # This is the magic step to stop the Exit Code 1 crash!
      run: |
        wget http://prdownloads.sourceforge.net/ta-lib/ta-lib-0.4.0-src.tar.gz
        tar -xzf ta-lib-0.4.0-src.tar.gz
        cd ta-lib/
        ./configure --prefix=/usr
        make
        sudo make install
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pandas
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Run tests with pytest
      run: |
        pytest tests/